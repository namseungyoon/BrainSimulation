# Full-scale CA1 network with EXACT per-target receptor tables.
# Identical to full_scale.yaml except receptor_table_scope=per_target, which
# loads the uncompressed 39-port exact syndata kinetics globally while keeping
# each NEST-GPU postsynaptic node group within its <=20 target-local ports.
# This is the "target-local receptor ports" structural fix; NEST-GPU only.
name: ca1_full_scale_pertarget

scale: 1.0
seed: 12345

duration_s: 10.0
dt_s: 0.0001

afferent_rate_hz: 0.65
afferent_topology: literal_source_graph
afferent_source_pool_size: 250000
afferent_source_pool_indegree: 64
recurrent_topology: modeldb_fastconn_binned

downscale_mode: preserve-indegree

backend: gpu
neuron_model: aglif_dend_cond_beta
compartment_aware_synapses: true
receptor_port_strategy: budget_weighted
receptor_table_scope: per_target
source_location_transfer_mode: all_dend
source_location_transfer_table: src/ca1/params/source_location_transfer_syndata120_budget_weighted.json

tier: full
crop_first_ms: 50.0
syndata_variant: 120

cellnumbers_index: 101
conndata_index: 430
conndata_count_mode: per_cell
