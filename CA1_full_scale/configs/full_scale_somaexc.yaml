# full_scale.yaml + source-backed structure fix: route perisomatic excitation
# to soma for the electrotonically-compact interneurons whose somata are
# otherwise starved in the reduced aglif_dend model (PV_Basket, Bistratified,
# O_LM). Morphology-grounded (0.05-0.27 lambda, Nav-dense dendrites); GABA stays
# dendritic. See docs/gate1b_status.md.
name: ca1_full_scale_somaexc

scale: 1.0
seed: 12345

duration_s: 10.0
dt_s: 0.0001

afferent_rate_hz: 0.65
afferent_topology: literal_source_graph
afferent_source_pool_size: 250000
afferent_source_pool_indegree: 64
recurrent_topology: modeldb_fastconn_binned

downscale_mode: preserve-indegree

backend: gpu
neuron_model: aglif_dend_cond_beta
compartment_aware_synapses: true
receptor_port_strategy: budget_weighted
source_location_transfer_mode: all_dend
source_location_transfer_table: src/ca1/params/source_location_transfer_syndata120_budget_weighted.json

aglif_receive_domain_overrides:
  PV_Basket: soma_excitatory
  Bistratified: soma_excitatory
  O_LM: soma_excitatory

tier: full
crop_first_ms: 50.0
syndata_variant: 120

cellnumbers_index: 101
conndata_index: 430
conndata_count_mode: per_cell
